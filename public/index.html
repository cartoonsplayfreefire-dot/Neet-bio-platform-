<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - NEET Biology PYQ</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="login">
  <div class="shell">
    <div class="topbar">
      <div class="nav">
        <div class="brand"><div class="logo"></div><div><h1 data-i18n="appTitle">NEET Biology PYQ</h1><p data-i18n="appSubtitle">Premium test practice platform</p></div></div>
        <div class="nav-actions"><button class="pill" id="themeBtn">Dark</button><button class="pill" id="langBtn">English</button><button class="pill" id="soundBtn">Sound On</button></div>
      </div>
    </div>
    <main>
      <section class="hero">
        <div class="row"><span class="badge" data-i18n="badgeBio">Biology only</span><span class="badge" data-i18n="badgeModes">Practice / Exam / Hard</span><span class="badge" data-i18n="badgePlain">Secure MongoDB storage</span></div>
        <h2 data-i18n="loginHeroTitle">Welcome back</h2>
        <p data-i18n="loginHeroText">Login to continue your NEET Biology practice.</p>
      </section>
      <section class="card">
        <div class="spread"><h3 data-i18n="loginTitle">Login</h3><span class="badge" data-i18n="loginBadge">Already have an account</span></div>
        <div class="stack">
          <input class="input" id="loginUser" placeholder="Username" data-i18n-placeholder="username" />
          <input class="input" id="loginPass" placeholder="Password" type="password" data-i18n-placeholder="password" />
          <button class="btn primary" id="loginBtn" data-i18n="loginBtn">Login</button>
          <div class="small"><span data-i18n="noAccount">New user?</span> <a href="/signup" style="text-decoration:underline;" data-i18n="signupLink">Sign up here</a> | <a href="/forgot" style="text-decoration:underline;">Forgot password</a></div>
        </div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
