<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Forgot Password</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body data-page="forgot">
  <div class="shell">
    <div class="topbar">
      <div class="nav">
        <div class="brand"><div class="logo"></div><div><h1 data-i18n="appTitle">NEET Biology PYQ</h1><p data-i18n="appSubtitle">Premium test practice platform</p></div></div>
        <div class="nav-actions"><button class="pill" id="themeBtn">Dark</button><button class="pill" id="langBtn">English</button><button class="pill" id="soundBtn">Sound On</button></div>
      </div>
    </div>
    <main>
      <section class="card">
        <h3 data-i18n="forgotTitle">Forgot password</h3>
        <div class="stack">
          <input class="input" id="fpUser" placeholder="Username" />
          <input class="input" id="fpPass" placeholder="New password" type="password" />
          <button class="btn primary" id="fpBtn">Reset password</button>
          <div class="small"><a href="/" style="text-decoration:underline;">Back to login</a></div>
        </div>
      </section>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
